name: Two-band Casimir contract tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      OMP_DYNAMIC: "FALSE"
      MKL_DYNAMIC: "FALSE"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Verify test collection after cleanup
        shell: bash
        run: |
          set +e
          python -m pytest --collect-only -q > collect-output.txt 2>&1
          status=$?
          cat collect-output.txt
          exit $status

      - name: Run full contract suite
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > full-pytest-output.txt 2>&1
          status=$?
          cat full-pytest-output.txt
          exit $status

      - name: Smoke test tightened CLI routing
        run: |
          python -m validation --help
          python -m validation matsubara --help
          python -m validation diagnostic --help

      - name: Execute reduced arbitrary-q performance smoke
        shell: bash
        run: |
          set +e
          python -m validation diagnostic arbitrary-q-performance-smoke \
            --pairings spm \
            --N 16 \
            --q-tasks 2 \
            --workers 2 \
            --matsubara-indices 0 1 \
            --canonical-block-size 64 \
            --runtime-chunk-sizes 64 256 \
            --output /tmp/arbitrary-q-performance-smoke.json \
            > performance-smoke-output.txt 2>&1
          status=$?
          cp /tmp/arbitrary-q-performance-smoke.json performance-smoke-result.json 2>/dev/null || true
          cat performance-smoke-output.txt
          if [[ $status -ne 0 ]]; then exit $status; fi
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/arbitrary-q-performance-smoke.json').read_text())
          assert payload['schema'] == 'arbitrary-q-performance-smoke-v2'
          assert payload['optimization_structure_passed'] is True
          assert payload['formal_performance_evidence'] is False
          timing = payload['pairings'][0]['records'][0]['serial_timing_breakdown']
          assert 'timing_seconds' in timing
          assert 'timing_fraction_of_reported_total' in timing
          PY

      - name: Execute fail-closed tiny arbitrary-q physics diagnostic
        shell: bash
        run: |
          set +e
          python -m validation diagnostic arbitrary-q-physics-smoke \
            --pairings spm \
            --N-values 16 \
            --workers 1 \
            --reference-nk 1256 \
            --matsubara-indices 0 1 \
            --canonical-block-size 64 \
            --runtime-chunk-size 256 \
            --output /tmp/arbitrary-q-physics-smoke.json \
            > physics-smoke-output.txt 2>&1
          status=$?
          cp /tmp/arbitrary-q-physics-smoke.json physics-smoke-result.json 2>/dev/null || true
          cat physics-smoke-output.txt
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/arbitrary-q-physics-smoke.json').read_text())
          assert payload['schema'] == 'arbitrary-q-physics-smoke-v2'
          assert payload['formal_numerical_evidence'] is False
          assert payload['interpretation']['convergence_claimed'] is False
          assert 'next_check_if_passed' in payload['interpretation']
          summary = payload['pairings'][0]['summary']
          assert summary['operator_identity_all_passed'] is True
          assert summary['integrated_ward_all_passed'] is True
          # N=16 is deliberately below the physical smoke scale and may fail
          # positive-sheet/static gates; the command must still emit full diagnostics.
          PY
          exit 0

      - name: Smoke test total zero-positive Gauss preflight and scan
        run: |
          python -m validation matsubara matsubara-orbit-gauss-crosscheck \
            --pairing spm \
            --nk 4 \
            --mx 1 \
            --my 0 \
            --matsubara-indices 0 1 \
            --gauss-orders 4 8 \
            --panel-count 1 \
            --transverse-workers 2 \
            --transverse-task-size 2 \
            --max-point-evaluations 128 \
            --output /tmp/spm-total-gauss-smoke.csv

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/spm-total-gauss-smoke.json').read_text())
          assert payload['schema'] == 'zero_positive_commensurate_orbit_fixed_gauss_crosscheck_v1'
          assert payload['status']['zero_matsubara_included'] is True
          assert payload['status']['zero_uses_exact_static_divided_difference'] is True
          assert payload['status']['zero_conductivity_division_used'] is False
          assert {row['response_sector'] for row in payload['rows']} == {'zero', 'positive'}
          assert all(row['pairing'] == 'spm' for row in payload['rows'])
          assert all(row['phase_hessian_policy'] == 'q_independent' for row in payload['rows'])
          assert all(row['material_workspace_implementation'] == 'batched_model_capability' for row in payload['rows'])
          assert all(row['q_workspace_implementation'] == 'batched_model_capability' for row in payload['rows'])
          assert all(row['execution_strategy'] == 'fork_process_transverse_nodes_ordered_parent_reduction' for row in payload['rows'])
          assert all(row['full_transverse_period_integrated'] is True for row in payload['rows'])
          assert all(row['symmetry_reduction_applied'] is False for row in payload['rows'])
          PY

          python -m validation matsubara orbit-gauss-preflight \
            --pairings spm dwave \
            --nk 4 \
            --mx 1 \
            --my 0 \
            --matsubara-indices 0 1 \
            --transverse-order 4 \
            --panel-count 1 \
            --transverse-workers 2 \
            --transverse-task-size 2 \
            --legacy-static-nk 4 \
            --legacy-static-order 4 \
            --minimum-speedup 0 \
            --minimum-parallel-cpu-wall-ratio 0 \
            --comparison-rtol 1e-8 \
            --comparison-atol 1e-9 \
            --no-require-physical \
            --output /tmp/total-preflight.json

          python -m validation matsubara total-orbit-gauss-scan \
            --case smoke:1:0 \
            --pairings spm \
            --nk 4 \
            --matsubara-indices 0 1 \
            --gauss-orders 4 8 \
            --panel-count 1 \
            --transverse-workers 2 \
            --transverse-task-size 2 \
            --preflight-manifest /tmp/total-preflight.json \
            --output-root /tmp/total-scan-smoke

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('/tmp/total-scan-smoke/scan_summary.json').read_text())
          assert payload['schema'] == 'total_matsubara_pointwise_gauss_scan_v2'
          assert payload['status']['zero_matsubara_included'] is True
          assert payload['status']['zero_uses_exact_static_divided_difference'] is True
          assert payload['status']['zero_conductivity_division_used'] is False
          assert payload['status']['static_physics_contract_softened'] is False
          assert payload['status']['preflight_passed'] is True
          assert payload['preflight']['accepted'] is True
          assert payload['status']['valid_for_casimir_input'] is False
          PY

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: two-band-casimir-test-reports
          path: |
            collect-output.txt
            full-pytest-output.txt
            performance-smoke-output.txt
            performance-smoke-result.json
            physics-smoke-output.txt
            physics-smoke-result.json
          if-no-files-found: ignore
          retention-days: 7

  apply-fixed-engine-migration:
    needs: contract-tests
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request head
        uses: actions/checkout@v4
        with:
          ref: refactor/casimir-fixed-chain-migration
          fetch-depth: 0

      - name: Generate production engine and compatibility facade
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('validation/lib/transverse_point_sweet_spot_engine_legacy.py')
          output = Path('src/lno327/casimir/fixed_point_engine.py')
          text = source.read_text(encoding='utf-8')
          replacements = {
              'from validation.lib.finite_q_validation_models import get_finite_q_validation_model': (
                  'from lno327.casimir.microscopic_model import '
                  'get_finite_q_microscopic_model'
              ),
              'from validation.lib.matsubara import matsubara_energy_eV': (
                  'from lno327.casimir.matsubara import matsubara_energy_eV'
              ),
              'get_finite_q_validation_model(': 'get_finite_q_microscopic_model(',
              'validation/outputs/matsubara/transverse_point_sweet_spot/diagnostic.json': (
                  'outputs/casimir/current/fixed_point_certification.json'
              ),
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'required migration token missing: {old}')
              text = text.replace(old, new)
          if 'from validation' in text or 'import validation' in text:
              raise SystemExit('production engine still imports validation')
          output.write_text(text, encoding='utf-8')

          source.write_text(
              '''"""Compatibility facade for the production fixed-point engine.

The complete numerical implementation now lives in
:mod:`lno327.casimir.fixed_point_engine`. Validation retains this module path only
so historical diagnostics and tests continue to call the same implementation.
"""
from __future__ import annotations

from lno327.casimir import fixed_point_engine as _production

for _name in dir(_production):
    if not _name.startswith("__"):
        globals().setdefault(_name, getattr(_production, _name))
''',
              encoding='utf-8',
          )

          Path('tests/test_casimir_fixed_point_engine_migration.py').write_text(
              '''"""Identity guards for the mechanically migrated fixed-point engine."""
from __future__ import annotations


def test_validation_legacy_engine_is_production_engine_surface() -> None:
    from lno327.casimir import fixed_point_engine as production
    from validation.lib import transverse_point_sweet_spot_engine_legacy as facade

    for name in (
        "assess_frequency_level",
        "_build_context_jobs",
        "_execute_level",
        "_plate_state",
        "_two_plate_state",
        "main",
    ):
        assert getattr(facade, name) is getattr(production, name)


def test_cpu_headroom_facade_still_wraps_production_parser() -> None:
    from lno327.casimir import fixed_point_engine as production
    from validation.lib import transverse_point_sweet_spot_engine as public_facade

    assert public_facade.assess_frequency_level is production.assess_frequency_level
    assert public_facade._legacy._parse_args is production._parse_args
''',
              encoding='utf-8',
          )
          PY

      - name: Restore workflow and commit migration
        shell: bash
        run: |
          git fetch origin feat/outer-q-integration-contract
          git checkout origin/feat/outer-q-integration-contract -- .github/workflows/two-band-casimir-contract.yml
          rm -f .github/workflows/generate-fixed-engine-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lno327/casimir/fixed_point_engine.py \
            validation/lib/transverse_point_sweet_spot_engine_legacy.py \
            tests/test_casimir_fixed_point_engine_migration.py \
            .github/workflows/two-band-casimir-contract.yml \
            .github/workflows/generate-fixed-engine-migration.yml
          git commit -m "Move fixed point certification engine into production"
          git push origin HEAD:refactor/casimir-fixed-chain-migration
