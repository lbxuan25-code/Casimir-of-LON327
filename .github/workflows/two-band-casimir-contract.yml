name: Two-band Casimir contract tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run contract and compatibility tests
        run: >-
          python -m pytest -q
          tests/test_effective_em_kernel_contract.py
          tests/test_electrodynamics_basis.py
          tests/test_positive_matsubara_sheet_response.py
          tests/test_two_band_casimir_contract_integration.py
          tests/test_sheet_reflection_contract.py
          tests/test_passive_sheet_logdet.py
          tests/test_primitive_xy_ward_validation.py
          tests/test_legacy_casimir_pipeline_retired.py
          tests/test_electrodynamics_reflection_regression.py
          tests/test_electrodynamics_conventions_regression.py
