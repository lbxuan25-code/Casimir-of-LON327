name: Validate Casimir runtime-v3 audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'fix/casimir-runtime-v3-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      OMP_DYNAMIC: "FALSE"
      MKL_DYNAMIC: "FALSE"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/casimir-runtime-v3-audit
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reconstruct exact audit patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import zlib

          root = Path('.github')
          encoded = ''.join(
              (root / f'runtime_v3_patch.{index:02d}').read_text()
              for index in range(4)
          )
          tail_hex = (
              (root / 'runtime_v3_patch.04a.hex').read_text()
              + (root / 'runtime_v3_patch.04b.hex').read_text()
          )
          encoded += bytes.fromhex(tail_hex).decode('ascii')
          script = zlib.decompress(base64.b64decode(encoded)).decode('utf-8')
          corrections = (
              (
                  r'return command\n\n\n\ndef _run_transverse_certifier',
                  r'return command\n\n+def _run_transverse_certifier',
              ),
              (
                  r'def _provider_statistics\(provider: Any\) -> dict\[str, (?:Any|int)\]:\n',
                  r'def _provider_statistics\(provider: [^)]+\) -> dict\[str, (?:Any|int)\]:\n',
              ),
              (
                  'updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)',
                  'updated, count = re.subn(pattern, lambda _: replacement, text, count=1, flags=re.S)',
              ),
              (
                  r'        "cache_hit_q_evaluations",\n    )\n    return {name: int(getattr(provider, name, 0)) for name in names}\n',
                  r'        "cache_hit_q_evaluations",\n        "requested_point_evaluations",\n        "new_point_evaluations",\n        "cache_hit_point_evaluations",\n    )\n    return {name: int(getattr(provider, name, 0)) for name in names}\n',
              ),
          )
          for old, new in corrections:
              if script.count(old) != 1:
                  raise RuntimeError(f'cannot apply patch-script correction: {old}')
              script = script.replace(old, new)
          Path('/tmp/apply_runtime_v3.py').write_text(script, encoding='utf-8')
          PY

      - name: Apply audit patch and capture result
        run: |
          set +e
          python /tmp/apply_runtime_v3.py > /tmp/runtime-v3-apply.log 2>&1
          echo $? > /tmp/runtime-v3-apply.exit
          set -e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-v3-apply-diagnostics
          path: |
            /tmp/runtime-v3-apply.log
            /tmp/runtime-v3-apply.exit

      - name: Require successful patch application
        run: |
          cat /tmp/runtime-v3-apply.log
          test "$(cat /tmp/runtime-v3-apply.exit)" = "0"
          rm -f .github/runtime_v3_patch.*
          rm -f .github/workflows/validate-runtime-v3-audit.yml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-v3-patched-tree
          path: |
            src/lno327/casimir/fixed_transverse_point_engine.py
            src/lno327/casimir/fixed_chain.py
            src/lno327/casimir/certified_point_provider.py
            src/lno327/casimir/adaptive_joint_q.py
            src/lno327/casimir/adaptive_outer_q.py
            src/lno327/casimir/adaptive_outer_tail.py
            src/lno327/casimir/adaptive_matsubara_tail.py
            src/lno327/casimir/production.py
            src/lno327/casimir/cli.py
            scripts/full_casimir/config.py
            scripts/full_casimir/cache_migration.py
            scripts/full_casimir/energy.py
            scripts/full_casimir/workflow.py
            scripts/full_casimir/postprocess.py
            scripts/full_casimir/plotting.py
            scripts/full_casimir/background.sh
            scripts/full_casimir/README.md
            tests/test_casimir_runtime_v3_audit.py

      - name: Install package
        run: python -m pip install -e ".[dev]" --quiet

      - name: Compile and shell-check changed modules
        run: |
          set +e
          python -m py_compile \
            src/lno327/casimir/fixed_transverse_point_engine.py \
            src/lno327/casimir/fixed_chain.py \
            src/lno327/casimir/certified_point_provider.py \
            src/lno327/casimir/adaptive_joint_q.py \
            src/lno327/casimir/adaptive_outer_q.py \
            src/lno327/casimir/adaptive_outer_tail.py \
            src/lno327/casimir/adaptive_matsubara_tail.py \
            src/lno327/casimir/production.py \
            src/lno327/casimir/cli.py \
            scripts/full_casimir/config.py \
            scripts/full_casimir/cache_migration.py \
            scripts/full_casimir/energy.py \
            scripts/full_casimir/workflow.py \
            scripts/full_casimir/postprocess.py \
            scripts/full_casimir/plotting.py \
            tests/test_casimir_runtime_v3_audit.py \
            > /tmp/runtime-v3-compile.log 2>&1
          compile_status=$?
          if [[ "$compile_status" == "0" ]]; then
            bash -n scripts/full_casimir/background.sh \
              >> /tmp/runtime-v3-compile.log 2>&1
            compile_status=$?
          fi
          echo "$compile_status" > /tmp/runtime-v3-compile.exit
          set -e
          cat /tmp/runtime-v3-compile.log
          test "$compile_status" = "0"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-v3-compile-diagnostics
          path: |
            /tmp/runtime-v3-compile.log
            /tmp/runtime-v3-compile.exit

      - name: Run targeted tests
        run: |
          pytest -q -x --tb=long \
            tests/test_casimir_runtime_v3_audit.py \
            tests/test_casimir_runtime_policy.py \
            tests/test_casimir_workflow_scripts.py \
            tests/test_certified_outer_q_provider.py \
            tests/test_frequency_extendable_certified_provider.py \
            tests/test_adaptive_joint_q.py \
            tests/test_adaptive_outer_tail.py \
            tests/test_adaptive_matsubara_tail.py

      - name: Run full suite and capture result
        run: |
          set +e
          pytest -q --tb=short > /tmp/runtime-v3-full-pytest.log 2>&1
          echo $? > /tmp/runtime-v3-full-pytest.exit
          set -e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-v3-full-pytest-diagnostics
          path: |
            /tmp/runtime-v3-full-pytest.log
            /tmp/runtime-v3-full-pytest.exit

      - name: Require complete suite
        run: |
          cat /tmp/runtime-v3-full-pytest.log
          test "$(cat /tmp/runtime-v3-full-pytest.exit)" = "0"

      - name: Commit validated source tree
        run: |
          set -euxo pipefail
          git diff --check
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Audit Casimir runtime scripts and optimize v3 pilots"
          git push origin HEAD:fix/casimir-runtime-v3-audit
