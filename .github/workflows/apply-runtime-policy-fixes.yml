name: Validate Casimir runtime policy fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'automation/runtime-policy-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      OMP_DYNAMIC: "FALSE"
      MKL_DYNAMIC: "FALSE"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/runtime-policy-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply exact source patch
        run: |
          python - <<'PY'
          import base64
          import zlib
          from pathlib import Path
          payload = base64.b64decode(
              Path('.github/runtime_policy_patch.b64').read_bytes()
          )
          Path('/tmp/apply_runtime_policy.py').write_bytes(
              zlib.decompress(payload)
          )
          PY
          python /tmp/apply_runtime_policy.py
          rm -f .github/runtime_policy_patch.b64
          rm -f .github/workflows/apply-runtime-policy-fixes.yml

      - name: Install package quietly
        run: python -m pip install -e ".[dev]" --quiet

      - name: Compile changed modules
        run: |
          python -m py_compile \
            src/lno327/casimir/certified_point_provider.py \
            src/lno327/casimir/adaptive_joint_q.py \
            src/lno327/casimir/adaptive_outer_tail.py \
            src/lno327/casimir/adaptive_matsubara_tail.py \
            src/lno327/casimir/production.py \
            src/lno327/casimir/cli.py \
            tests/test_casimir_runtime_policy.py

      - name: Capture targeted test result
        run: |
          set +e
          pytest -q -x --tb=long \
            tests/test_casimir_runtime_policy.py \
            tests/test_certified_outer_q_provider.py \
            tests/test_frequency_extendable_certified_provider.py \
            tests/test_adaptive_joint_q.py \
            tests/test_adaptive_outer_tail.py \
            tests/test_adaptive_matsubara_tail.py \
            tests/test_casimir_cli.py \
            tests/test_casimir_performance_batching.py \
            > /tmp/runtime-policy-pytest.txt 2>&1
          echo $? > /tmp/runtime-policy-pytest-exit.txt
          set -e

      - uses: actions/upload-artifact@v4
        with:
          name: runtime-policy-pytest
          path: |
            /tmp/runtime-policy-pytest.txt
            /tmp/runtime-policy-pytest-exit.txt

      - name: Require targeted tests
        run: |
          cat /tmp/runtime-policy-pytest.txt
          test "$(cat /tmp/runtime-policy-pytest-exit.txt)" = "0"

      - name: Run full suite
        run: pytest -q --tb=short

      - name: Commit validated source tree
        run: |
          set -euxo pipefail
          git diff --check
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix Casimir batching and rebalance runtime error budgets"
          git push origin HEAD:automation/runtime-policy-fixes
