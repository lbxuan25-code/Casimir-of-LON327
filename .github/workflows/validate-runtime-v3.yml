name: Validate Casimir runtime v3 audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.head_ref == 'audit/casimir-runtime-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      OMP_DYNAMIC: "FALSE"
      MKL_DYNAMIC: "FALSE"
      MALLOC_ARENA_MAX: "4"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/casimir-runtime-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Patch fixed chain and Matsubara orchestration
        run: python .github/patch_runtime_v3_fixed.py

      - name: Patch provider batching and extraction
        run: python .github/patch_runtime_v3_provider.py

      - name: Patch provider payload validation
        run: python .github/patch_runtime_v3_payload.py

      - name: Patch joint orchestration and offset errors
        run: python .github/patch_runtime_v3_joint.py

      - name: Patch joint exception hierarchy
        run: python .github/patch_runtime_v3_catch.py

      - name: Remove temporary patch machinery
        run: |
          rm -f .github/patch_runtime_v3_*.py
          rm -f .github/workflows/validate-runtime-v3.yml

      - name: Install package
        run: python -m pip install -e ".[dev]" --quiet

      - name: Compile audited modules
        run: |
          python -m py_compile \
            src/lno327/casimir/fixed_chain.py \
            src/lno327/casimir/certified_point_provider.py \
            src/lno327/casimir/adaptive_joint_q.py \
            src/lno327/casimir/adaptive_matsubara_tail.py \
            src/lno327/casimir/production.py \
            src/lno327/casimir/cli.py \
            scripts/full_casimir/config.py \
            scripts/full_casimir/energy.py \
            scripts/full_casimir/workflow.py \
            scripts/full_casimir/postprocess.py \
            scripts/full_casimir/plotting.py \
            tests/test_casimir_runtime_v3_audit.py \
            tests/test_casimir_workflow_scripts.py
          bash -n scripts/full_casimir/background.sh

      - name: Run targeted runtime tests
        run: |
          pytest -q -x --tb=long \
            tests/test_casimir_runtime_v3_audit.py \
            tests/test_casimir_workflow_scripts.py \
            tests/test_certified_outer_q_provider.py \
            tests/test_frequency_extendable_certified_provider.py \
            tests/test_adaptive_joint_q.py \
            tests/test_adaptive_outer_tail.py \
            tests/test_adaptive_matsubara_tail.py \
            tests/test_casimir_performance_batching.py

      - name: Run complete test suite
        run: pytest -q --tb=short

      - name: Verify and commit validated tree
        run: |
          set -euxo pipefail
          git diff --check
          git status --short
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Audit Casimir runtime v3 and optimize pilot orchestration"
          git push origin HEAD:audit/casimir-runtime-v3
