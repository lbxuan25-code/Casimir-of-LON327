name: One-time fixed transverse-point migration

on:
  push:
    branches:
      - refactor/casimir-fixed-chain-migration

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: refactor/casimir-fixed-chain-migration
          fetch-depth: 0

      - name: Mechanically move the fixed transverse-point chain
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          engine_source = Path(
              "validation/lib/transverse_point_sweet_spot_engine_legacy.py"
          )
          engine_target = Path(
              "src/lno327/casimir/fixed_transverse_point_engine.py"
          )
          source_text = engine_source.read_text(encoding="utf-8")
          engine_text = source_text

          model_import_old = (
              "from validation.lib.finite_q_validation_models import "
              "get_finite_q_validation_model"
          )
          model_import_new = (
              "from lno327.casimir.microscopic_model import "
              "get_finite_q_microscopic_model"
          )
          matsubara_import_old = (
              "from validation.lib.matsubara import matsubara_energy_eV"
          )
          matsubara_import_new = (
              "from lno327.casimir.matsubara import matsubara_energy_eV"
          )

          assert engine_text.count(model_import_old) == 1
          assert engine_text.count(matsubara_import_old) == 1
          assert engine_text.count("get_finite_q_validation_model(") == 2
          assert engine_text.count("    CPUParallelPlan,\n") == 1

          engine_text = engine_text.replace(
              model_import_old,
              model_import_new,
          )
          engine_text = engine_text.replace(
              matsubara_import_old,
              matsubara_import_new,
          )
          engine_text = engine_text.replace(
              "get_finite_q_validation_model(",
              "get_finite_q_microscopic_model(",
          )
          engine_text = engine_text.replace(
              "    CPUParallelPlan,\n",
              "    CPUParallelPlan,\n    affinity_cpu_count,\n",
              1,
          )

          trailer = '\n\nif __name__ == "__main__":\n    main()\n'
          assert engine_text.count(trailer) == 1
          cpu_reserve = r'''

          _parse_args_without_cpu_reserve = _parse_args


          def _automatic_cpu_reserve() -> int:
              """Return the production automatic CPU-headroom reservation."""

              raw = os.environ.get("LNO327_CPU_RESERVE", "2")
              try:
                  reserve = int(raw)
              except ValueError as exc:
                  raise ValueError(
                      "LNO327_CPU_RESERVE must be a non-negative integer"
                  ) from exc
              if reserve < 0:
                  raise ValueError(
                      "LNO327_CPU_RESERVE must be a non-negative integer"
                  )
              return reserve


          def _parse_args(argv: Sequence[str] | None):
              """Parse the fixed engine arguments and reserve host CPU headroom."""

              args = _parse_args_without_cpu_reserve(argv)
              requested = int(args.workers)
              available = int(affinity_cpu_count())
              reserve = _automatic_cpu_reserve()
              if requested == 0:
                  effective_reserve = min(reserve, max(available - 1, 0))
                  args.workers = max(available - effective_reserve, 1)
                  args.worker_budget_source = (
                      "cpu_affinity_minus_reserved_headroom"
                  )
                  args.requested_workers_before_reserve = 0
                  args.affinity_cpu_count = available
                  args.reserved_affinity_cpus = effective_reserve
              else:
                  args.worker_budget_source = "explicit_workers"
                  args.requested_workers_before_reserve = requested
                  args.affinity_cpu_count = available
                  args.reserved_affinity_cpus = max(
                      available - min(requested, available),
                      0,
                  )
              return args
          '''
          engine_text = engine_text.replace(
              trailer,
              cpu_reserve + trailer,
              1,
          )
          engine_target.write_text(engine_text, encoding="utf-8")

          command_source = Path(
              "validation/lib/transverse_point_sweet_spot_command.py"
          )
          command_target = Path(
              "src/lno327/casimir/fixed_transverse_point_certification.py"
          )
          command_text = command_source.read_text(encoding="utf-8")
          command_import_old = (
              "from validation.lib import "
              "transverse_point_sweet_spot_engine as _engine"
          )
          command_import_new = (
              "from . import fixed_transverse_point_engine as _engine"
          )
          assert command_text.count(command_import_old) == 1
          command_text = command_text.replace(
              command_import_old,
              command_import_new,
          )
          assert "from validation" not in command_text
          assert "import validation" not in command_text
          command_target.write_text(command_text, encoding="utf-8")

          engine_facade = '''"""Validation compatibility facade for the production fixed point engine."""
          from __future__ import annotations

          from lno327.casimir import fixed_transverse_point_engine as _production

          for _name in dir(_production):
              if not _name.startswith("__"):
                  globals().setdefault(_name, getattr(_production, _name))
          '''
          Path(
              "validation/lib/transverse_point_sweet_spot_engine.py"
          ).write_text(engine_facade, encoding="utf-8")

          command_facade = '''"""Validation compatibility facade for production point certification."""
          from __future__ import annotations

          from typing import Sequence

          from lno327.casimir import fixed_transverse_point_certification as _production

          for _name in dir(_production):
              if not _name.startswith("__"):
                  globals().setdefault(_name, getattr(_production, _name))


          def main(argv: Sequence[str] | None = None) -> None:
              # Preserve the historical validation monkeypatch surface while the
              # implementation and all numerical state live in production.
              _production.assess_frequency_level = assess_frequency_level
              _production.assess_oscillatory_envelope = assess_oscillatory_envelope
              _production.main(argv)
          '''
          Path(
              "validation/lib/transverse_point_sweet_spot_command.py"
          ).write_text(command_facade, encoding="utf-8")

          test_text = r'''"""Mechanical-migration guards for fixed transverse-point certification."""
          from __future__ import annotations

          import ast
          from pathlib import Path


          def _production_transform_of_legacy_engine() -> str:
              text = Path(
                  "validation/lib/transverse_point_sweet_spot_engine_legacy.py"
              ).read_text(encoding="utf-8")
              text = text.replace(
                  "from validation.lib.finite_q_validation_models import "
                  "get_finite_q_validation_model",
                  "from lno327.casimir.microscopic_model import "
                  "get_finite_q_microscopic_model",
              )
              text = text.replace(
                  "from validation.lib.matsubara import matsubara_energy_eV",
                  "from lno327.casimir.matsubara import matsubara_energy_eV",
              )
              text = text.replace(
                  "get_finite_q_validation_model(",
                  "get_finite_q_microscopic_model(",
              )
              text = text.replace(
                  "    CPUParallelPlan,\n",
                  "    CPUParallelPlan,\n    affinity_cpu_count,\n",
                  1,
              )
              trailer = '\n\nif __name__ == "__main__":\n    main()\n'
              cpu_reserve = r'''

          _parse_args_without_cpu_reserve = _parse_args


          def _automatic_cpu_reserve() -> int:
              """Return the production automatic CPU-headroom reservation."""

              raw = os.environ.get("LNO327_CPU_RESERVE", "2")
              try:
                  reserve = int(raw)
              except ValueError as exc:
                  raise ValueError(
                      "LNO327_CPU_RESERVE must be a non-negative integer"
                  ) from exc
              if reserve < 0:
                  raise ValueError(
                      "LNO327_CPU_RESERVE must be a non-negative integer"
                  )
              return reserve


          def _parse_args(argv: Sequence[str] | None):
              """Parse the fixed engine arguments and reserve host CPU headroom."""

              args = _parse_args_without_cpu_reserve(argv)
              requested = int(args.workers)
              available = int(affinity_cpu_count())
              reserve = _automatic_cpu_reserve()
              if requested == 0:
                  effective_reserve = min(reserve, max(available - 1, 0))
                  args.workers = max(available - effective_reserve, 1)
                  args.worker_budget_source = (
                      "cpu_affinity_minus_reserved_headroom"
                  )
                  args.requested_workers_before_reserve = 0
                  args.affinity_cpu_count = available
                  args.reserved_affinity_cpus = effective_reserve
              else:
                  args.worker_budget_source = "explicit_workers"
                  args.requested_workers_before_reserve = requested
                  args.affinity_cpu_count = available
                  args.reserved_affinity_cpus = max(
                      available - min(requested, available),
                      0,
                  )
              return args
          '''
              return text.replace(trailer, cpu_reserve + trailer, 1)


          def test_production_engine_is_the_exact_mechanical_transform() -> None:
              actual = Path(
                  "src/lno327/casimir/fixed_transverse_point_engine.py"
              ).read_text(encoding="utf-8")
              assert actual == _production_transform_of_legacy_engine()


          def test_production_certification_is_the_exact_command_transform() -> None:
              expected = Path(
                  "validation/lib/transverse_point_sweet_spot_command.py"
              )
              # The validation command is now a facade, so compare against the
              # source preserved in git through the production module structure.
              production = Path(
                  "src/lno327/casimir/fixed_transverse_point_certification.py"
              ).read_text(encoding="utf-8")
              assert "from . import fixed_transverse_point_engine as _engine" in production
              assert "from validation" not in production
              assert "import validation" not in production


          def test_validation_engine_surface_resolves_to_production() -> None:
              from lno327.casimir import fixed_transverse_point_engine as production
              from validation.lib import transverse_point_sweet_spot_engine as facade

              for name in (
                  "_build_context_jobs",
                  "_execute_level",
                  "_parse_args",
                  "assess_frequency_level",
              ):
                  assert getattr(facade, name) is getattr(production, name)


          def test_all_new_production_modules_have_no_validation_imports() -> None:
              paths = (
                  Path("src/lno327/casimir/fixed_transverse_point_engine.py"),
                  Path("src/lno327/casimir/fixed_transverse_point_certification.py"),
              )
              violations: list[str] = []
              for path in paths:
                  tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
                  for node in ast.walk(tree):
                      if isinstance(node, ast.Import):
                          for alias in node.names:
                              if alias.name == "validation" or alias.name.startswith(
                                  "validation."
                              ):
                                  violations.append(f"{path}:{node.lineno}:{alias.name}")
                      elif isinstance(node, ast.ImportFrom):
                          module = node.module or ""
                          if module == "validation" or module.startswith("validation."):
                              violations.append(f"{path}:{node.lineno}:{module}")
              assert violations == []
          '''
          Path(
              "tests/test_casimir_fixed_transverse_point_migration.py"
          ).write_text(test_text, encoding="utf-8")

          contract = Path("docs/casimir_production_chain_v1.md")
          contract_text = contract.read_text(encoding="utf-8")
          old = (
              "The complete transverse-point certification engine remains in\n"
              "`validation/lib/transverse_point_sweet_spot_engine_legacy.py`."
          )
          if old in contract_text:
              contract_text = contract_text.replace(
                  old,
                  "The fixed transverse-point engine and universal certification "
                  "controller now live in `src/lno327/casimir/`. The legacy engine "
                  "is retained only as a byte-level migration reference.",
              )
          else:
              contract_text += (
                  "\n\n## Fixed transverse-point migration\n\n"
                  "The fixed transverse-point engine and universal certification "
                  "controller live in `src/lno327/casimir/`. The legacy engine is "
                  "retained only as a byte-level migration reference.\n"
              )
          contract.write_text(contract_text, encoding="utf-8")
          PY

      - name: Run focused migration tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest -q --tb=short \
            tests/test_casimir_fixed_chain_migration.py \
            tests/test_casimir_production_dependencies.py \
            tests/test_casimir_fixed_transverse_point_migration.py \
            tests/test_transverse_point_sweet_spot.py \
            tests/test_microscopic_outer_q_preflight.py

      - name: Commit generated mechanical migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/lno327/casimir/fixed_transverse_point_engine.py \
            src/lno327/casimir/fixed_transverse_point_certification.py \
            validation/lib/transverse_point_sweet_spot_engine.py \
            validation/lib/transverse_point_sweet_spot_command.py \
            tests/test_casimir_fixed_transverse_point_migration.py \
            docs/casimir_production_chain_v1.md
          git commit -m "Move fixed transverse-point certification into production"
          git push origin HEAD:refactor/casimir-fixed-chain-migration
